/* =====================================================================
   CAMERA  — 초기: 프리 카메라, 평면 전체 부감 (y=13, 정수직 하향)
===================================================================== */
camera.position.set(6, 9.4, 3.3);  // 아파트 중앙 상공 (초기 줌인 3단계)
var yaw = 0, pitch = -Math.PI / 2; // 정수직 아래
camera.rotation.y = yaw;
camera.rotation.x = pitch;

/* =====================================================================
   CONTROLS
===================================================================== */
var freeMode = true;               // 초기 프리 카메라 모드
var drag = false, dragX = 0, dragY = 0;
var keys = {};
var eyeHeight = 1.60;              // 1인칭 눈높이 (m, 기본 160cm), Q/E로 ±1cm 조정

var badge = document.getElementById('badge');
var ch    = document.getElementById('ch');
var hint  = document.getElementById('hint');
var eyeLabel = document.getElementById('eye-label');

// 초기 UI 상태: 프리 카메라
badge.textContent = '🎥 프리 카메라 모드';
badge.style.background = 'rgba(130,30,190,.88)';
ch.style.display = 'none';
hint.style.opacity = '0';  // 1인칭 힌트 숨김

document.addEventListener('keydown', function(e) {
  keys[e.code] = true;
  if (e.code === 'Space') {
    e.preventDefault();
    freeMode = !freeMode;
    if (freeMode) {
      badge.textContent = '🎥 프리 카메라 모드';
      badge.style.background = 'rgba(130,30,190,.88)';
      ch.style.display = 'none';
      document.exitPointerLock();
      // 1인칭 → 프리 전환 시 카메라 초기 상태로 리셋
      camera.position.set(6, 9.4, 3.3);
      yaw   = 0;
      pitch = -Math.PI / 2;
    } else {
      badge.textContent = '👤 1인칭 모드';
      badge.style.background = 'rgba(30,110,220,.88)';
      ch.style.display = 'block';
      camera.position.y = eyeHeight;
      pitch = 0;   // 1인칭 전환 시 정면(수평) 바라보기
      eyeLabel.style.display = 'block';
      eyeLabel.textContent = Math.round(eyeHeight*100) + ' cm';
    }
    if (freeMode) eyeLabel.style.display = 'none';
  }
  // 프리 카메라 모드에서 R 키 → 카메라 초기 상태로 리셋
  if (e.code === 'KeyR' && freeMode) {
    e.preventDefault();
    camera.position.set(6, 9.4, 3.3);
    yaw   = 0;
    pitch = -Math.PI / 2;
  }
  // 1인칭 모드에서 Q/E 키 → 눈높이 ±1cm
  if (!freeMode) {
    if (e.code === 'KeyE') {
      e.preventDefault();
      eyeHeight = Math.min(2.30, eyeHeight + 0.01);
      eyeLabel.textContent = Math.round(eyeHeight*100) + ' cm';
    }
    if (e.code === 'KeyQ') {
      e.preventDefault();
      eyeHeight = Math.max(0.30, eyeHeight - 0.01);
      eyeLabel.textContent = Math.round(eyeHeight*100) + ' cm';
    }
  }
  // 미니맵 표시/숨김 토글 — e.code 사용 → 한글 IME 모드에서도 동작
  if (e.code === 'KeyM') {
    e.preventDefault();
    var mc = document.getElementById('minimap');
    var ml = document.getElementById('minimap-legend');
    var hidden = (mc.style.display === 'none');
    mc.style.display = hidden ? '' : 'none';
    if (ml) ml.style.display = hidden ? '' : 'none';
  }
});
document.addEventListener('keyup', function(e) { keys[e.code] = false; });

// 문 토글 공통 함수 (NDC 좌표 기준 레이캐스트)
//   - 회전형(swing): doorMesh = 단일 패널 메시.
//   - 미닫이(slide): doorMesh = THREE.Group (글래스+프레임+간살+손잡이 묶음).
//     intersectObjects 가 recursive=true 로 그룹 안 메시까지 검사 후,
//     hit.object 의 부모 체인을 거슬러 올라가 doorMesh 와 일치하는 항목 찾음.
//   - linkGroup: 같은 그룹 ID 를 공유하면 한 패널 클릭 시 모두 함께 토글
//     (영림 3연동 중문 등).
function _toggleDoorAtNDC(ndcX, ndcY){
  var ray = new THREE.Raycaster();
  ray.setFromCamera(new THREE.Vector2(ndcX, ndcY), camera);
  var doorMeshes = [];
  for (var _di = 0; _di < _doors.length; _di++) doorMeshes.push(_doors[_di].doorMesh);
  var hits = ray.intersectObjects(doorMeshes, true);   // recursive — 그룹 안 메시도 검사
  if (hits.length === 0) return;

  var hitObj = hits[0].object;
  var matchedIdx = -1;
  for (var _dj = 0; _dj < _doors.length && matchedIdx < 0; _dj++) {
    var dm = _doors[_dj].doorMesh;
    var cur = hitObj;
    while (cur) {
      if (cur === dm) { matchedIdx = _dj; break; }
      cur = cur.parent;
    }
  }
  if (matchedIdx < 0) return;

  var newState = !_doors[matchedIdx].isOpen;
  var grp = _doors[matchedIdx].linkGroup;
  if (grp) {
    // 연동 토글 — 같은 linkGroup 의 모든 패널 함께 (3연동 중문 등)
    for (var _dk = 0; _dk < _doors.length; _dk++) {
      if (_doors[_dk].linkGroup === grp) _doors[_dk].isOpen = newState;
    }
  } else {
    _doors[matchedIdx].isOpen = newState;
  }
}

// 클릭 핸들러 — 1인칭 전용 (프리 모드는 mouseup에서 처리)
renderer.domElement.addEventListener('click', function(e) {
  if (freeMode) return;
  if (document.pointerLockElement !== renderer.domElement) {
    renderer.domElement.requestPointerLock();
    return;
  }
  _toggleDoorAtNDC(0, 0);
});

/* ─────────────────────────────────────────────────────────────────
   프리 카메라 드래그 ARM 시스템
   - 마우스 좌버튼 누른 후 1초 경과 전: 카메라 안 움직임 (짧은 클릭 허용)
   - 1초 경과 후: 카메라 회전 활성화
   - 1초 전에 떼면: 문 토글 클릭으로 처리
   - 진행 상태는 커서 아래 작은 프로그래스 바로 표시
   ─────────────────────────────────────────────────────────────── */
var _dragArmed = false;
var _armTimer = null;
var ARM_DURATION = 1000;             // 1초
var armBar  = document.getElementById('drag-arm-bar');
var armFill = document.getElementById('drag-arm-fill');
function _positionArmBar(x, y){
  armBar.style.left = x + 'px';
  armBar.style.top  = (y + 18) + 'px';
}
function _hideArmBar(){
  armBar.style.display = 'none';
  armBar.classList.remove('armed');
  armFill.style.width = '0%';
}
function _clearArmTimer(){
  if (_armTimer){ clearInterval(_armTimer); _armTimer = null; }
}
document.addEventListener('pointerlockchange', function() {
  if (document.pointerLockElement === renderer.domElement) {
    hint.style.opacity = '0';
  }
});

// Mouse for free-camera drag & first-person pointer-lock look
renderer.domElement.addEventListener('mousedown', function(e) {
  if (e.button === 0 && freeMode) {
    drag = true; dragX = e.clientX; dragY = e.clientY;
    _dragArmed = false;
    _positionArmBar(e.clientX, e.clientY);
    armBar.style.display = 'block';
    armBar.classList.remove('armed');
    armFill.style.width = '0%';
    var t0 = performance.now();
    _clearArmTimer();
    _armTimer = setInterval(function(){
      var elapsed = performance.now() - t0;
      var pct = Math.min(100, (elapsed / ARM_DURATION) * 100);
      armFill.style.width = pct + '%';
      if (elapsed >= ARM_DURATION){
        _dragArmed = true;
        armBar.classList.add('armed');     // 색상 변경 (yellow → green) — 카메라 회전 가능
        _clearArmTimer();
      }
    }, 20);
  }
});
document.addEventListener('mouseup', function(e) {
  if (drag && freeMode) {
    if (!_dragArmed) {
      // 1초 경과 전 마우스를 떼면 → 짧은 클릭 → 문 토글 시도
      var rect = renderer.domElement.getBoundingClientRect();
      var ndcX =  ((e.clientX - rect.left) / rect.width)  * 2 - 1;
      var ndcY = -((e.clientY - rect.top)  / rect.height) * 2 + 1;
      _toggleDoorAtNDC(ndcX, ndcY);
    }
    _clearArmTimer();
    _hideArmBar();
    _dragArmed = false;
  }
  drag = false;
});

// 프리 카메라 — 휠 줌 (카메라 시선 방향으로 전진/후진)
renderer.domElement.addEventListener('wheel', function(e) {
  if (!freeMode) return;
  e.preventDefault();
  var speed = 0.012;                          // 줌 민감도 (필요시 조절)
  var delta = e.deltaY * speed;               // +: 줌아웃, -: 줌인
  // 현재 시선 방향(yaw·pitch 적용된 단위 벡터)으로 이동
  var cosP = Math.cos(pitch);
  var fwdX = -Math.sin(yaw) * cosP;
  var fwdY =  Math.sin(pitch);
  var fwdZ = -Math.cos(yaw) * cosP;
  camera.position.x += fwdX * (-delta);
  camera.position.y += fwdY * (-delta);
  camera.position.z += fwdZ * (-delta);
}, { passive: false });

document.addEventListener('mousemove', function(e) {
  // 프리 모드 드래그 중이면 ARM 바를 커서 따라 이동
  if (drag && freeMode) _positionArmBar(e.clientX, e.clientY);

  var dx = 0, dy = 0;
  if (freeMode) {
    if (!drag) return;
    if (!_dragArmed) {
      // 1초 경과 전 — 카메라 회전 안 함, 다만 dragX/Y 갱신해 ARM 후 점프 방지
      dragX = e.clientX; dragY = e.clientY;
      return;
    }
    dx = e.clientX - dragX; dy = e.clientY - dragY;
    dragX = e.clientX; dragY = e.clientY;
  } else {
    if (document.pointerLockElement !== renderer.domElement) return;
    dx = e.movementX || 0; dy = e.movementY || 0;
  }
  yaw   -= dx * 0.0030;
  pitch -= dy * 0.0028;
  if (pitch >  1.38) pitch =  1.38;
  if (pitch < -1.38) pitch = -1.38;
});

</script>
<script src="powerplan.js"></script>
<script src="minimap.js"></script>
<script>
"use strict";

/* =====================================================================
   디버그 모드 (항목 S) — URL 에 ?debug 가 있을 때만 활성
   - 50cm 그리드 라인 (옅은 회색) + 1m 그리드 (조금 진하게)
   - X(빨강) / Z(파랑) 축 (원점 0,0 에서 시작)
   - 가구 BBox 외곽선 (녹색, y=FT+0.001)
   - 미니맵·SHIFT 라벨에 영향 없음 — 추가 메시만 scene 에 부착.
   기본(비활성) 시 어떤 메시도 생성되지 않아 동작/성능 변경 0.
===================================================================== */
const DEBUG = location.search.indexOf('debug') !== -1;
if (DEBUG) {
  var dbg = new THREE.Group();
  dbg.name = '_debugOverlay';
  scene.add(dbg);

  function dbgLine(x1,z1, x2,z2, color, y){
    y = (y === undefined) ? FT + 0.002 : y;
    var g = new THREE.BufferGeometry();
    g.setAttribute('position', new THREE.Float32BufferAttribute(
      [x1, y, z1,  x2, y, z2], 3));
    var m = new THREE.LineBasicMaterial({color:color});
    dbg.add(new THREE.Line(g, m));
  }

  // 50 cm / 1 m 그리드 (xL~xR, zT~zB)
  for (var gx = 0; gx <= 12; gx += 0.5) {
    dbgLine(gx, zT, gx, zB, (gx % 1 === 0) ? 0x666666 : 0x303030);
  }
  for (var gz = 0; gz <= 6.6; gz += 0.5) {
    dbgLine(xL, gz, xR, gz, (Math.abs(gz - Math.round(gz)) < 0.01) ? 0x666666 : 0x303030);
  }

  // X / Z 축 (강조 색)
  dbgLine(xL, zT, xR, zT, 0xff4040, FT + 0.005);  // X 축 (빨강)
  dbgLine(xL, zT, xL, zB, 0x4080ff, FT + 0.005);  // Z 축 (파랑)

  // 가구 BBox 외곽선 (녹색)
  if (typeof window._mmData !== 'undefined') {
    window._mmData.FURNITURE_BBOX.forEach(function(b){
      dbgLine(b[0], b[1], b[2], b[1], 0x40c060);
      dbgLine(b[2], b[1], b[2], b[3], 0x40c060);
      dbgLine(b[2], b[3], b[0], b[3], 0x40c060);
      dbgLine(b[0], b[3], b[0], b[1], 0x40c060);
    });
  }

  console.log('[S] 디버그 모드 활성 — 그리드/축/BBox 오버레이 표시. window._mmData 로 미니맵 데이터 접근 가능.');
}

/* =====================================================================
   ANIMATION LOOP
===================================================================== */
var clock = new THREE.Clock();
var WALK  = 3.5;
var FLY   = 6.0;

// animate() 매 프레임 호출되는 임시 벡터들 — 모듈 스코프에 한 번만 생성하고
// .set() 으로 재사용해 GC 압박을 제거 (60fps × 4 alloc = 240/s 신규 → 0).
var _fwd   = new THREE.Vector3();
var _right = new THREE.Vector3();
var _up3   = new THREE.Vector3(0, 1, 0);
var _move  = new THREE.Vector3();

function animate() {
  requestAnimationFrame(animate);
  var dt = Math.min(clock.getDelta(), 0.05);

  camera.rotation.y = yaw;
  camera.rotation.x = pitch;

  _fwd  .set(-Math.sin(yaw), 0, -Math.cos(yaw));
  _right.set( Math.cos(yaw), 0, -Math.sin(yaw));
  // _up3 는 (0,1,0) 고정 — 갱신 불필요
  _move .set(0, 0, 0);

  if (keys['KeyW']) _move.addScaledVector(_fwd,    1);
  if (keys['KeyS']) _move.addScaledVector(_fwd,   -1);
  if (keys['KeyA']) _move.addScaledVector(_right, -1);
  if (keys['KeyD']) _move.addScaledVector(_right,  1);

  if (freeMode) {
    if (keys['KeyE']) _move.addScaledVector(_up3,  1);
    if (keys['KeyQ']) _move.addScaledVector(_up3, -1);
    if (_move.lengthSq() > 0) _move.normalize();
    camera.position.addScaledVector(_move, FLY * dt);
  } else {
    _move.y = 0;
    if (_move.lengthSq() > 0) _move.normalize();
    camera.position.addScaledVector(_move, WALK * dt);
    camera.position.y = eyeHeight;
  }

  // 문 열림/닫힘 부드러운 보간
  //   - kind 미지정 / 'rotate' = 스윙·플랩 도어 (rotation 보간). axis 미지정='y'
  //     = 스윙 도어 (openRY). axis='x'/'z' = 플랩 도어 (openR).
  //   - kind='slide' = 미닫이 도어 (position 보간). slideAxis (기본 'z'),
  //     slideOrigin (기준 위치), slideOpen (열렸을 때 추가 offset).
  for (var _da = 0; _da < _doors.length; _da++) {
    var _d = _doors[_da];
    if (_d.kind === 'slide') {
      var _sa = _d.slideAxis || 'z';
      var _baseP   = _d.slideOrigin;
      var _targetP = _baseP + (_d.isOpen ? _d.slideOpen : 0);
      _d.pivot.position[_sa] += (_targetP - _d.pivot.position[_sa]) * Math.min(1, dt * 7);
    } else {
      var _ax = _d.axis || 'y';
      var _opR = (_ax === 'y') ? _d.openRY : _d.openR;
      var _target = _d.isOpen ? _opR : 0;
      _d.pivot.rotation[_ax] += (_target - _d.pivot.rotation[_ax]) * Math.min(1, dt * 7);
    }
  }

  // 1인칭 모드: 아파트 외부에서는 벽 안 보이게 (X-ray 효과)
  if (!freeMode) {
    var _inApt = camera.position.x > xL && camera.position.x < xR
              && camera.position.z > zT && camera.position.z < zB;
    mExt.visible  = _inApt;
    mWall.visible = _inApt;
  } else {
    mExt.visible  = true;
    mWall.visible = true;
  }
  // 천장: 1인칭 모드에서만 표시, 프리 카메라에서는 숨김
  mCeil.visible = !freeMode;

  renderer.render(scene, camera);
  _drawMinimap();
}
animate();
</script>
